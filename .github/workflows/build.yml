name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pindl-linux
          - os: windows-latest
            artifact: pindl-windows.exe
          - os: macos-latest
            artifact: pindl-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          pip install httpx[http2] browser-cookie3 rich click pyinstaller

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name "${{ matrix.artifact }}" main.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name "${{ matrix.artifact }}" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: dist/**/*
          generate_release_notes: true
